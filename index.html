<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智能短线操盘分析系统</title>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="短线操盘">
<link rel="apple-touch-icon" href="icon-192.png">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,"Microsoft YaHei",sans-serif}
body{background:#0d1117;color:#e6edf3;font-size:14px;overflow:hidden;height:100vh}

/* ── 密码登录 ── */
.password-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:9999;backdrop-filter:blur(4px)}
.password-box{width:380px;background:linear-gradient(135deg,#161b22,#1c2333);border-radius:16px;padding:40px 35px;text-align:center;border:1px solid #30363d;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.password-box .icon{font-size:48px;margin-bottom:10px}
.password-box h2{font-size:20px;color:#58a6ff;margin-bottom:6px;font-weight:600}
.password-box .sub{color:#8b949e;font-size:13px;margin-bottom:25px}
.password-box input{width:100%;height:44px;background:#0d1117;border:1px solid #30363d;border-radius:8px;padding:0 16px;color:#e6edf3;font-size:15px;outline:none;transition:border .2s}
.password-box input:focus{border-color:#58a6ff}
.password-box .login-btn{width:100%;height:44px;background:#238636;border:none;border-radius:8px;color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:16px;transition:background .2s}
.password-box .login-btn:hover{background:#2ea043}
.password-box .error{color:#f85149;font-size:13px;margin-top:12px;display:none}
.password-box .hint{color:#8b949e;font-size:12px;margin-top:18px}

/* ── 主布局 ── */
.wrapper{display:none;height:100vh;flex-direction:column}
.header{height:48px;background:#161b22;border-bottom:1px solid #30363d;display:flex;align-items:center;justify-content:space-between;padding:0 18px;flex-shrink:0}
.header .logo{font-size:16px;font-weight:700;color:#58a6ff}
.header .logo span{color:#8b949e;font-weight:400}
.header .nav{display:flex;gap:12px}
.header .nav button{background:transparent;border:1px solid #30363d;border-radius:6px;color:#c9d1d9;padding:5px 14px;cursor:pointer;font-size:13px;transition:all .2s}
.header .nav button:hover{border-color:#58a6ff;color:#58a6ff}
.content{display:flex;flex:1;overflow:hidden}

/* ── 左侧: 自选股 ── */
.sidebar{width:220px;background:#161b22;border-right:1px solid #30363d;display:flex;flex-direction:column;flex-shrink:0}
.sidebar .s-title{font-size:13px;font-weight:600;color:#8b949e;padding:14px 14px 8px;letter-spacing:.5px}
.sidebar .s-list{flex:1;overflow-y:auto;padding:0 8px}
.sidebar .s-list::-webkit-scrollbar{width:4px}
.sidebar .s-list::-webkit-scrollbar-thumb{background:#30363d;border-radius:4px}
.stock-item{padding:9px 10px;border-radius:8px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;margin-bottom:2px;transition:background .15s;border:1px solid transparent}
.stock-item:hover{background:#1c2333}
.stock-item.active{background:#1c2541;border-color:#1f6feb}
.stock-item .s-info{display:flex;flex-direction:column;gap:1px}
.stock-item .s-name{font-size:13px;font-weight:500}
.stock-item .s-code{font-size:11px;color:#8b949e}
.stock-item .s-price{font-size:13px;font-weight:600;text-align:right}
.stock-item .s-pct{font-size:11px;text-align:right}
.stock-item .s-del{background:transparent;border:none;color:#8b949e;cursor:pointer;font-size:16px;padding:0 4px;display:none;line-height:1}
.stock-item:hover .s-del{display:block}
.stock-item .s-del:hover{color:#f85149}
.red{color:#f85149}
.green{color:#3fb950}
.blue{color:#58a6ff}
.sidebar .empty-tip{text-align:center;padding:30px 14px;color:#8b949e;font-size:13px;line-height:1.8}

/* ── 拖拽分隔条 ── */
.divider{width:5px;background:transparent;cursor:col-resize;flex-shrink:0;position:relative;z-index:5;transition:background .15s}
.divider:hover,.divider.active{background:#21262d}
.divider::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:1px;height:24px;background:#30363d;border-radius:2px}

/* ── 中间主区 ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;padding:14px 16px 8px;min-width:0}
.search-bar{display:flex;gap:8px;margin-bottom:12px;flex-shrink:0}
.search-bar input{flex:1;height:38px;background:#0d1117;border:1px solid #30363d;border-radius:8px;padding:0 14px;color:#e6edf3;font-size:14px;outline:none}
.search-bar input:focus{border-color:#58a6ff}
.search-bar button{height:38px;padding:0 18px;border:none;border-radius:8px;font-weight:600;font-size:13px;cursor:pointer;transition:background .2s}
.search-bar .q-btn{background:#1f6feb;color:#fff}
.search-bar .q-btn:hover{background:#388bfd}
.search-bar .c-btn{background:#21262d;color:#c9d1d9;padding:0 12px}
.search-bar .c-btn:hover{background:#30363d}

/* ── 分析面板 ── */
.analysis{flex:1;display:flex;flex-direction:column;gap:10px;overflow-y:auto;min-height:0}
.analysis::-webkit-scrollbar{width:4px}
.analysis::-webkit-scrollbar-thumb{background:#30363d;border-radius:4px}
.panel{background:#161b22;border-radius:10px;padding:14px 16px;border:1px solid #21262d}
.panel .p-title{font-size:13px;font-weight:600;color:#8b949e;margin-bottom:8px}
.price-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:6px}
.price-grid .pg-item{text-align:center;padding:8px 6px;background:#0d1117;border-radius:8px}
.price-grid .pg-label{font-size:11px;color:#8b949e;margin-bottom:2px}
.price-grid .pg-value{font-size:17px;font-weight:700}
.sr-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.sr-item{padding:8px 10px;border-radius:8px;text-align:center;background:#0d1117}
.sr-item .sr-label{font-size:11px;color:#8b949e}
.sr-item .sr-value{font-size:15px;font-weight:700;margin-top:2px}
.sr-item .sr-hint{font-size:10px;color:#8b949e;margin-top:2px}

/* ── 分时图 ── */
.chart-area{position:relative;height:200px;background:#0d1117;border-radius:8px;overflow:hidden;margin-top:6px}
.chart-area canvas{width:100%;height:100%}

/* ── MACD ── */
.macd-row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.macd-row .macd-badge{padding:4px 12px;border-radius:20px;font-size:13px;font-weight:600}
.macd-row .macd-info{font-size:12px;color:#8b949e}

/* ── 决策建议 ── */
.decision-box{padding:10px 16px;border-radius:8px;text-align:center;font-weight:600;font-size:15px}
.decision-box.buy{background:rgba(46,160,67,.15);color:#3fb950;border:1px solid rgba(46,160,67,.3)}
.decision-box.sell{background:rgba(248,81,73,.15);color:#f85149;border:1px solid rgba(248,81,73,.3)}
.decision-box.hold{background:rgba(88,166,255,.1);color:#58a6ff;border:1px solid rgba(88,166,255,.2)}
.decision-box.wait{background:rgba(139,148,158,.1);color:#8b949e;border:1px solid rgba(139,148,158,.2)}

/* ── 右侧 ── */
.rightbar{width:280px;background:#161b22;border-left:1px solid #30363d;display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.rightbar::-webkit-scrollbar{width:4px}
.rightbar::-webkit-scrollbar-thumb{background:#30363d;border-radius:4px}
.rightbar .rb-section{padding:12px 14px;border-bottom:1px solid #21262d}
.rightbar .rb-title{font-size:13px;font-weight:600;color:#8b949e;margin-bottom:10px}
.chart-box{height:110px;position:relative}
.chart-box-sm{height:90px;position:relative}
.score-display{text-align:center;padding:10px 0}
.score-display .score-num{font-size:36px;font-weight:700}
.score-display .score-label{font-size:12px;color:#8b949e}
.t-item{display:flex;justify-content:space-between;align-items:center;padding:6px 0}
.t-item .t-label{font-size:12px;color:#8b949e}
.t-item .t-value{font-weight:600;font-size:14px}
.t-input-group{display:flex;gap:6px;margin-top:8px}
.t-input-group input{flex:1;height:32px;background:#0d1117;border:1px solid #30363d;border-radius:6px;padding:0 10px;color:#e6edf3;font-size:12px;outline:none}
.t-input-group button{height:32px;padding:0 12px;background:#1f6feb;border:none;border-radius:6px;color:#fff;font-size:12px;font-weight:600;cursor:pointer}
.t-profit{font-size:18px;font-weight:700;text-align:center;padding:8px 0}

/* ── 设置弹窗 ── */
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);align-items:center;justify-content:center;z-index:9998;backdrop-filter:blur(2px)}
.modal.show{display:flex}
.modal-box{width:400px;background:#161b22;border-radius:14px;padding:28px 30px;border:1px solid #30363d;box-shadow:0 20px 50px rgba(0,0,0,.5)}
.modal-box h3{font-size:17px;font-weight:600;margin-bottom:18px;color:#e6edf3}
.modal-box .m-field{margin-bottom:14px}
.modal-box .m-field label{display:block;font-size:12px;color:#8b949e;margin-bottom:4px}
.modal-box .m-field input,.modal-box .m-field select{width:100%;height:38px;background:#0d1117;border:1px solid #30363d;border-radius:6px;padding:0 12px;color:#e6edf3;font-size:13px;outline:none}
.modal-box .m-field select{cursor:pointer}
.modal-box .m-field input:focus{border-color:#58a6ff}
.modal-box .modal-actions{display:flex;gap:10px;margin-top:18px;justify-content:flex-end}
.modal-box .modal-actions button{padding:8px 20px;border-radius:6px;border:none;font-weight:600;font-size:13px;cursor:pointer}
.modal-box .modal-actions .m-primary{background:#238636;color:#fff}
.modal-box .modal-actions .m-primary:hover{background:#2ea043}
.modal-box .modal-actions .m-cancel{background:#21262d;color:#c9d1d9}
.modal-box .modal-actions .m-cancel:hover{background:#30363d}
.modal-box .m-tip{font-size:12px;color:#8b949e;margin-top:4px}
.modal-box .m-error{color:#f85149;font-size:12px;display:none;margin-top:4px}

/* ── 刷新提示 ── */
.refresh-bar{display:flex;justify-content:space-between;align-items:center;padding:2px 0 6px;flex-shrink:0}
.refresh-bar .time{font-size:11px;color:#8b949e}
.refresh-bar .status{font-size:11px;padding:2px 10px;border-radius:10px}
.refresh-bar .status.live{background:rgba(46,160,67,.15);color:#3fb950}
.refresh-bar .status.mock{background:rgba(139,148,158,.1);color:#8b949e}

.add-btn{background:#238636;border:none;border-radius:8px;color:#fff;font-weight:600;padding:8px 20px;cursor:pointer;font-size:13px;margin-top:6px;transition:background .2s}
.add-btn:hover{background:#2ea043}
.add-btn:disabled{background:#21262d;color:#8b949e;cursor:not-allowed}

/* ── 响应式 ── */
@media(max-width:1100px){.rightbar{width:240px}}
@media(max-width:800px){.rightbar,.divider{display:none}.sidebar{width:180px}.price-grid{grid-template-columns:repeat(2,1fr)}.sr-grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>

<!-- ════════════ 密码登录 ════════════ -->
<div class="password-overlay" id="loginOverlay">
  <div class="password-box">
    <div class="icon">📊</div>
    <h2>智能短线操盘系统</h2>
    <div class="sub">请输入密码以解锁交易面板</div>
    <input type="password" id="pwdInput" placeholder="请输入登录密码" autofocus>
    <button class="login-btn" id="loginBtn">登录</button>
    <div class="error" id="pwdError">❌ 密码错误，请重新输入</div>
    <div class="hint">如需密码请联系帅气的永辉</div>
  </div>
</div>

<!-- ════════════ 设置弹窗 ════════════ -->
<div class="modal" id="settingsModal">
  <div class="modal-box">
    <h3>⚙️ 系统设置</h3>
    <div class="m-field">
      <label>修改密码</label>
      <input type="password" id="oldPwd" placeholder="原密码">
      <input type="password" id="newPwd" placeholder="新密码" style="margin-top:6px">
      <input type="password" id="confirmPwd" placeholder="确认新密码" style="margin-top:6px">
      <div class="m-error" id="pwdChangeError">两次密码不一致</div>
      <button style="margin-top:6px;padding:6px 16px;background:#1f6feb;border:none;border-radius:6px;color:#fff;cursor:pointer;font-size:12px" id="pwdChangeBtn">确认修改</button>
      <div class="m-tip" id="pwdChangeTip"></div>
    </div>
    <div class="m-field">
      <label>声音提醒</label>
      <select id="soundAlert">
        <option value="on">开启</option>
        <option value="off">关闭</option>
      </select>
    </div>
    <div class="m-field">
      <label>弹窗提醒</label>
      <select id="popupAlert">
        <option value="on">开启</option>
        <option value="off">关闭</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="m-cancel" onclick="closeSettings()">关闭</button>
      <button class="m-primary" onclick="saveSettings()">保存设置</button>
    </div>
  </div>
</div>

<!-- ════════════ 主界面 ════════════ -->
<div class="wrapper" id="mainWrapper">

  <!-- 顶部导航 -->
  <div class="header">
    <div class="logo">📈 智能短线操盘 <span>· 专注做T</span></div>
    <div class="nav">
      <button onclick="openSettings()">⚙️ 设置</button>
      <button onclick="logout()">🚪 退出</button>
    </div>
  </div>

  <div class="content">

    <!-- 左侧：自选股 -->
    <div class="sidebar">
      <div class="s-title">⭐ 我的自选股</div>
      <div class="s-list" id="watchlistContainer">
        <div class="empty-tip" id="emptyTip">暂无自选股<br>输入股票代码并添加到自选股</div>
      </div>
    </div>
    <div class="divider" id="dividerLeft"></div>

    <!-- 中间主区 -->
    <div class="main">
      <div class="search-bar">
        <input type="text" id="stockCodeInput" placeholder="输入股票代码（如 300104、002371）" maxlength="6">
        <button class="q-btn" onclick="searchStock()">查询分析</button>
        <button class="c-btn" onclick="clearSearch()">✕</button>
      </div>

      <div class="refresh-bar">
        <span class="time" id="updateTime">等待数据...</span>
        <span>
          <span class="status live" id="dataStatus" style="margin-right:8px">● 模拟数据</span>
          <button onclick="manualRefresh()" style="background:#21262d;border:1px solid #30363d;border-radius:6px;color:#c9d1d9;padding:2px 10px;cursor:pointer;font-size:12px">🔄 刷新</button>
        </span>
      </div>

      <div class="analysis" id="analysisArea">
        <!-- 股票分析内容由 JS 动态渲染 -->
        <div class="panel" style="text-align:center;padding:40px">
          <div style="font-size:40px;margin-bottom:12px">🔍</div>
          <div style="color:#8b949e;font-size:15px">输入股票代码，查看详细分析</div>
          <div style="color:#8b949e;font-size:12px;margin-top:6px">支持沪深两市所有 A 股</div>
        </div>
      </div>
    </div>
    <div class="divider" id="dividerRight"></div>

    <!-- 右侧：图表 + 做T助手 -->
    <div class="rightbar">
      <div class="rb-section">
        <div class="rb-title">📊 量能对比</div>
        <div class="chart-box-sm"><canvas id="volumeChart"></canvas></div>
      </div>
      <div class="rb-section">
        <div class="rb-title">🧩 资金构成</div>
        <div class="chart-box-sm"><canvas id="fundChart"></canvas></div>
      </div>
      <div class="rb-section">
        <div class="rb-title">⚡ 短线强弱</div>
        <div class="score-display">
          <div class="score-num" id="strengthScore">--</div>
          <div class="score-label" id="strengthLabel">等待数据</div>
        </div>
      </div>
      <div class="rb-section">
        <div class="rb-title">🔄 做T助手</div>
        <div class="t-item"><span class="t-label">低吸区间</span><span class="t-value green" id="tBuyZone">--</span></div>
        <div class="t-item"><span class="t-label">高抛区间</span><span class="t-value red" id="tSellZone">--</span></div>
        <div class="t-item"><span class="t-label">今日收益</span><span class="t-value" id="tDailyProfit">0.00</span></div>
        <div class="t-item"><span class="t-label">累计收益</span><span class="t-value" id="tTotalProfit">0.00</span></div>
        <div style="margin-top:8px">
          <div class="t-label" style="margin-bottom:4px">记录做T</div>
          <div class="t-input-group">
            <input type="number" id="tBuyPrice" placeholder="买入价" step="0.01">
            <input type="number" id="tSellPrice" placeholder="卖出价" step="0.01">
            <button onclick="recordTrade()">记录</button>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- ════════════ JavaScript ════════════ -->
<script>
// ── 状态 ──
const STATE = {
  password: '888888',
  watchlist: JSON.parse(localStorage.getItem('trader_watchlist') || '[]'),
  trades: JSON.parse(localStorage.getItem('trader_trades') || '[]'),
  soundOn: localStorage.getItem('trader_sound') !== 'off',
  popupOn: localStorage.getItem('trader_popup') !== 'off',
  currentStock: null,
  timer: null,
  recentSearches: [],
};

// ── 股票名称对照表 ──
const STOCK_NAMES = {
  '300104':'江波龙','002371':'北方华创','600519':'贵州茅台','000858':'五粮液',
  '300750':'宁德时代','601318':'中国平安','000333':'美的集团','600036':'招商银行',
  '002594':'比亚迪','600900':'长江电力','000001':'平安银行','002415':'海康威视',
  '600276':'恒瑞医药','300059':'东方财富','601012':'隆基绿能','000725':'京东方A',
  '002714':'牧原股份','688981':'中芯国际','600887':'伊利股份','000651':'格力电器',
  '002475':'立讯精密','002230':'科大讯飞','600309':'万华化学','688041':'海光信息',
};

// ── 登录 ──
document.getElementById('loginBtn').addEventListener('click', checkPassword);
document.getElementById('pwdInput').addEventListener('keydown', e => { if(e.key==='Enter') checkPassword(); });

function checkPassword(){
  const pwd = document.getElementById('pwdInput').value.trim();
  if(pwd === STATE.password){
    document.getElementById('loginOverlay').style.display='none';
    document.getElementById('mainWrapper').style.display='flex';
    init();
  } else {
    const err = document.getElementById('pwdError');
    err.style.display='block';
    setTimeout(()=>err.style.display='none',2000);
  }
}

function logout(){
  document.getElementById('mainWrapper').style.display='none';
  document.getElementById('loginOverlay').style.display='flex';
  document.getElementById('pwdInput').value='';
}

// ── 初始化 ──
function init(){
  document.getElementById('soundAlert').value = STATE.soundOn ? 'on' : 'off';
  document.getElementById('popupAlert').value = STATE.popupOn ? 'on' : 'off';
  renderWatchlist();
  // 首次加载
  if(STATE.watchlist.length > 0){
    const firstCode = STATE.watchlist[0];
    document.getElementById('stockCodeInput').value = firstCode;
    selectWatchlist(firstCode);
  }
  document.getElementById('stockCodeInput').addEventListener('keydown', e => {
    if(e.key==='Enter') searchStock();
  });
}

// ── 自选股渲染 ──
function renderWatchlist(){
  const container = document.getElementById('watchlistContainer');
  const emptyTip = document.getElementById('emptyTip');
  // 清除除了emptyTip之外的内容
  container.querySelectorAll('.stock-item').forEach(el => el.remove());

  if(STATE.watchlist.length === 0){
    emptyTip.style.display='block';
    return;
  }
  emptyTip.style.display='none';

  // 按代码顺序显示
  STATE.watchlist.forEach(code => {
    const name = STOCK_NAMES[code] || code;
    const item = document.createElement('div');
    item.className = 'stock-item';
    if(STATE.currentStock && STATE.currentStock.code === code) item.classList.add('active');
    item.dataset.code = code;
    item.innerHTML = `
      <div class="s-info">
        <div class="s-name">${name}</div>
        <div class="s-code">${code}</div>
      </div>
      <div>
        <div class="s-price" id="wp-${code}">--</div>
        <div class="s-pct" id="wpct-${code}"></div>
      </div>
      <button class="s-del" onclick="event.stopPropagation();removeWatchlist('${code}')">×</button>`;
    item.addEventListener('click', ()=>selectWatchlist(code));
    container.appendChild(item);

  document.querySelectorAll('.stock-item').forEach(el => el.classList.remove('active'));
  const el = document.querySelector(`.stock-item[data-code="${code}"]`);

// ── 搜索股票 ──
function searchStock(){
  let code = document.getElementById('stockCodeInput').value.trim();
  if(!code){ alert('请输入股票代码'); return; }
  while(code.length < 6) code = '0' + code;
  if(!/^\d{6}$/.test(code)){ alert('股票代码格式不正确'); return; }
  document.getElementById('stockCodeInput').value = code;

  STATE.recentSearches = [code, ...STATE.recentSearches.filter(c=>c!==code)].slice(0,3);

  const name = STOCK_NAMES[code] || code;
  STATE.currentStock = { code, name };
  document.querySelectorAll('.stock-item').forEach(el => el.classList.remove('active'));
  const el = document.querySelector(`.stock-item[data-code="${code}"]`);
  if(el) el.classList.add('active');

  fetchStockData(code, true);
}

}

// ── 获取股票数据 ──
async function fetchStockData(code, showLoading=true){
  const name = STOCK_NAMES[code] || code;
  if(showLoading){
    document.getElementById('analysisArea').innerHTML =
      '<div class="panel" style="text-align:center;padding:30px"><div style="color:#8b949e">📡 获取数据中...</div></div>';
  }

  // file:// 协议直接用模拟数据
  if(location.protocol === 'file:'){
    setTimeout(() => {
      genMockData(code, name);
      setDataStatus('mock', '模拟数据（本地文件）');
    }, 300);
    return;
  }

  // 腾讯行情 API（支持 CORS，无需 script hack）
  const prefix = code.startsWith('6')||code.startsWith('9') ? 'sh' : 'sz';
  try {
    const resp = await fetch(`https://qt.gtimg.cn/q=${prefix}${code}`);
    const raw = await resp.text(); // 自动按 GBK 解码
    const start = raw.indexOf('"');
    const end = raw.indexOf('"', start + 1);
    if(start !== -1 && end !== -1){
      const parts = raw.substring(start + 1, end).split('~');
      if(parts.length > 35 && parts[3] && !isNaN(parseFloat(parts[3]))){
        const price = parseFloat(parts[3]);
        const prevClose = parseFloat(parts[4]);
        const open = parseFloat(parts[5]);
        const changePct = parseFloat(parts[32]);
        const high = parseFloat(parts[33]);
        const low = parseFloat(parts[34]);
        const volume = (parseInt(parts[6]) || 0) * 100; // 手 → 股
        const amount = (parseFloat(parts[37]) || 0) * 10000; // 万元 → 元
        const volRatio = +(Math.random()*2+0.3).toFixed(2);
        const tailRatio = +(Math.random()*1.5+0.5).toFixed(2);
        renderAnalysis(code, name, price, changePct, high, low, open, prevClose, volRatio, tailRatio, volume, amount, true);
        setDataStatus('live', '● 实时数据');
        return;
      }
    }
  } catch(_) {}
  fallbackMock(code, name);
}

function fallbackMock(code, name){
  genMockData(code, name);
  setDataStatus('mock', '● 模拟数据（接口超时）');
}

function setDataStatus(cls, text){
  const el = document.getElementById('dataStatus');
  if(el){ el.className = 'status ' + cls; el.textContent = text; }
}

// ── 生成模拟数据 ──
function genMockData(code, name){
  const basePrice = {
    '300104':38.62,'002371':128.50,'600519':1331,'000858':87.18,
    '300750':428.82,'601318':56.27,'000333':82.80,'600036':42.15,
    '002594':285.60,'600900':28.90,'000001':11.85,'002415':32.50,
    '600276':42.30,'300059':25.60,'601012':18.45,'000725':4.82,
    '002714':52.30,'688981':98.60,'600887':28.15,'000651':42.80,
    '002475':38.90,'002230':152.30,'600309':82.50,'688041':135.20,
  }[code] || +(Math.random()*100+10).toFixed(2);

  const seed = parseInt(code.slice(-2), 16) || 1;
  const changePct = +(((seed % 7 - 3) + Math.random()*2)).toFixed(2);
  const price = +(basePrice * (1 + changePct/100)).toFixed(2);
  const high = +(price * (1 + Math.random()*0.02)).toFixed(2);
  const low = +(price * (1 - Math.random()*0.015)).toFixed(2);
  const open = +(basePrice * (1 + (Math.random()-0.5)*0.01)).toFixed(2);
  const volRatio = +(Math.random()*3+0.3).toFixed(2);
  const tailRatio = +(Math.random()*2+0.3).toFixed(2);
  const volume = Math.floor(Math.random()*100000 + 10000);
  const amount = +(price * volume * 100).toFixed(2);

  STATE.currentStock = { code, name, price, changePct, high, low, open, volRatio, tailRatio, volume, amount };
  renderAnalysis(code, name, price, changePct, high, low, open, price*(1-0.01), volRatio, tailRatio, volume, amount, false);
}

  // 决策建议

// ── 分时图 ──
function drawTimeShareChart(code, currentPrice, prevClose){
  setTimeout(()=>{
    const canvas = document.getElementById('timeShareChart');
    if(!canvas) return;
    const rect = canvas.parentElement.getBoundingClientRect();
    canvas.width = rect.width * 2;
    canvas.height = rect.height * 2;
    canvas.style.width = rect.width+'px';
    canvas.style.height = rect.height+'px';
    const ctx = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height;
    ctx.scale(2,2);

    const w = rect.width, h = rect.height;
    const pad = { t:15, b:15, l:40, r:15 };
    const cw = w - pad.l - pad.r;
    const ch = h - pad.t - pad.b;
    const steps = 240;
    const basePrice = prevClose || currentPrice * 0.99;
    const maxP = basePrice * 1.02;
    const minP = basePrice * 0.98;

    ctx.clearRect(0,0,w,h);

    // 背景网格
    ctx.strokeStyle = '#21262d';
    ctx.lineWidth = 0.5;
    for(let i=0;i<=4;i++){
      const y = pad.t + ch * i / 4;
      ctx.beginPath(); ctx.moveTo(pad.l, y); ctx.lineTo(pad.l+cw, y); ctx.stroke();
    }

    // 均线
    const avgPoints = [];
    for(let i=0;i<steps;i++){
      const t = i / steps;
      const noise = Math.sin(t*8)*0.3 + Math.sin(t*3)*0.2 + (Math.random()-0.5)*0.15;
      avgPoints.push(basePrice + (basePrice * 0.01 * noise));
    }

    // 价格线
    const pricePoints = [];
    for(let i=0;i<steps;i++){
      const t = i / steps;
      const noise = Math.sin(t*12+1)*0.4 + Math.sin(t*5+0.5)*0.25 + (Math.random()-0.5)*0.2;
      const offset = (i < steps-1) ? (basePrice * 0.012 * noise) : (currentPrice - basePrice);
      pricePoints.push(basePrice + offset);
    }
    // 最后一点匹配当前价
    pricePoints[steps-1] = currentPrice;

    const xf = (i) => pad.l + cw * i / steps;
    const yf = (v) => pad.t + ch * (1 - (v - minP) / (maxP - minP));

    // 价格线填充
    ctx.beginPath();
    ctx.moveTo(xf(0), pad.t+ch);
    for(let i=0;i<steps;i++) ctx.lineTo(xf(i), yf(pricePoints[i]));
    ctx.lineTo(xf(steps-1), pad.t+ch);
    ctx.closePath();
    const grad = ctx.createLinearGradient(0,pad.t,0,pad.t+ch);
    const c = currentPrice >= basePrice ? 'rgba(248,81,73,' : 'rgba(63,185,80,';
    grad.addColorStop(0, c+'0.2)');
    grad.addColorStop(1, c+'0.02)');
    ctx.fillStyle = grad;
    ctx.fill();

    // 价格线
    ctx.beginPath();
    for(let i=0;i<steps;i++){
      if(i===0) ctx.moveTo(xf(i), yf(pricePoints[i]));
      else ctx.lineTo(xf(i), yf(pricePoints[i]));
    }
    ctx.strokeStyle = currentPrice >= basePrice ? '#f85149' : '#3fb950';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // 均线
    ctx.beginPath();
    for(let i=0;i<steps;i++){
      if(i===0) ctx.moveTo(xf(i), yf(avgPoints[i]));
      else ctx.lineTo(xf(i), yf(avgPoints[i]));
    }
    ctx.strokeStyle = '#d29922';
    ctx.lineWidth = 1;
    ctx.setLineDash([3,3]);
    ctx.stroke();
    ctx.setLineDash([]);

    // 基准线
    const baseY = yf(basePrice);
    ctx.beginPath();
    ctx.moveTo(pad.l, baseY);
    ctx.lineTo(pad.l+cw, baseY);
    ctx.strokeStyle = '#30363d';
    ctx.lineWidth = 0.5;
    ctx.stroke();

    // 价格标签
    ctx.fillStyle = '#8b949e';
    ctx.font = '10px sans-serif';
    ctx.fillText(currentPrice.toFixed(2), pad.l+cw-60, pad.t+12);

    // 中点价格
    ctx.fillText(basePrice.toFixed(2), 2, baseY+4);

    // 低吸/高抛标记
    const buyY = yf(basePrice * 0.992);
    const sellY = yf(basePrice * 1.008);
    ctx.fillStyle = '#3fb950';
    ctx.font = '11px sans-serif';
    ctx.fillText('▼ 低吸区', pad.l+10, buyY);
    ctx.fillStyle = '#f85149';
    ctx.fillText('▲ 高抛区', pad.l+10, Math.min(sellY, pad.t+ch-5));
  }, 50);
}

// ── 做T助手 ──
function recordTrade(){
  const buy = parseFloat(document.getElementById('tBuyPrice').value);
  const sell = parseFloat(document.getElementById('tSellPrice').value);
  if(!buy || !sell){ alert('请输入买入价和卖出价'); return; }
  const profit = +(sell - buy).toFixed(2);
  STATE.trades.push({ buy, sell, profit, time: new Date().toLocaleString() });
  localStorage.setItem('trader_trades', JSON.stringify(STATE.trades));
  document.getElementById('tBuyPrice').value = '';
  document.getElementById('tSellPrice').value = '';
  calcProfit();
  alert(`💰 做T完成！单次收益：${profit >= 0 ? '+' : ''}${profit}`);
}

function calcProfit(){
  const daily = STATE.trades.filter(t => {
    return t.time && t.time.startsWith(new Date().toLocaleDateString().slice(0,10));
  });
  const dProfit = daily.reduce((s,t) => s + t.profit, 0);
  const tProfit = STATE.trades.reduce((s,t) => s + t.profit, 0);
  const dpEl = document.getElementById('tDailyProfit');
  const tpEl = document.getElementById('tTotalProfit');
  if(dpEl){ dpEl.textContent = (dProfit >= 0 ? '+' : '') + dProfit.toFixed(2); dpEl.className = 't-value ' + (dProfit >= 0 ? 'red' : 'green'); }
  if(tpEl){ tpEl.textContent = (tProfit >= 0 ? '+' : '') + tProfit.toFixed(2); tpEl.className = 't-value ' + (tProfit >= 0 ? 'red' : 'green'); }
}

// ── 设置 ──
function openSettings(){
  document.getElementById('settingsModal').classList.add('show');
}
function closeSettings(){
  document.getElementById('settingsModal').classList.remove('show');
  document.getElementById('pwdChangeError').style.display='none';
  document.getElementById('pwdChangeTip').textContent='';
}

function saveSettings(){
  STATE.soundOn = document.getElementById('soundAlert').value === 'on';
  STATE.popupOn = document.getElementById('popupAlert').value === 'on';
  localStorage.setItem('trader_sound', STATE.soundOn ? 'on' : 'off');
  localStorage.setItem('trader_popup', STATE.popupOn ? 'on' : 'off');
  closeSettings();
  alert('✅ 设置已保存');
}

// 密码修改
document.getElementById('pwdChangeBtn')?.addEventListener('click', function(){
  const old = document.getElementById('oldPwd').value;
  const np = document.getElementById('newPwd').value;
  const cp = document.getElementById('confirmPwd').value;
  if(old !== STATE.password){
    document.getElementById('pwdChangeError').textContent = '原密码错误';
    document.getElementById('pwdChangeError').style.display='block';
    return;
  }
  if(np !== cp || np.length < 4){
    document.getElementById('pwdChangeError').textContent = '两次密码不一致或密码太短';
    document.getElementById('pwdChangeError').style.display='block';
    return;
  }
  STATE.password = np;
  document.getElementById('pwdChangeError').style.display='none';
  document.getElementById('pwdChangeTip').textContent = '✅ 密码修改成功！';
  document.getElementById('oldPwd').value='';
  document.getElementById('newPwd').value='';
  document.getElementById('confirmPwd').value='';
});

// 点击弹窗外部关闭
document.getElementById('settingsModal').addEventListener('click', function(e){
  if(e.target === this) closeSettings();
});

// ── 初始加载时更新自选股 ──
calcProfit();
// ── 面板宽度拖拽 ──
(function(){
  const sidebar = document.querySelector('.sidebar');
  const rightbar = document.querySelector('.rightbar');
  const dLeft = document.getElementById('dividerLeft');
  const dRight = document.getElementById('dividerRight');
  if(!sidebar || !dLeft || !dRight) return;

  // 恢复保存的宽度
  const savedW = localStorage.getItem('trader_sidebar_w');
  if(savedW) sidebar.style.width = savedW + 'px';
  if(window.innerWidth > 800){
    const savedR = localStorage.getItem('trader_rightbar_w');
    if(savedR) rightbar.style.width = savedR + 'px';
  }

  let startX, startW, target;

  function onMouseMove(e){
    const dx = e.clientX - startX;
    if(target === sidebar){
      const w = Math.max(120, Math.min(400, startW + dx));
      target.style.width = w + 'px';
      localStorage.setItem('trader_sidebar_w', w);
    } else if(target === rightbar){
      const w = Math.max(160, Math.min(500, startW - dx));
      target.style.width = w + 'px';
      localStorage.setItem('trader_rightbar_w', w);
    }
  }

  function onMouseUp(){
    document.removeEventListener('mousemove', onMouseMove);
    document.removeEventListener('mouseup', onMouseUp);
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
    document.body.style.pointerEvents = '';
    dLeft.classList.remove('active');
    dRight.classList.remove('active');
  }

  function initDrag(el, t){
    el.addEventListener('mousedown', e => {
      e.preventDefault();
      target = t;
      startX = e.clientX;
      startW = t.getBoundingClientRect().width;
      document.body.style.cursor = 'col-resize';
      document.body.style.userSelect = 'none';
      document.body.style.pointerEvents = 'none';
      el.classList.add('active');
      document.addEventListener('mousemove', onMouseMove);
      document.addEventListener('mouseup', onMouseUp);
    });
  }

  initDrag(dLeft, sidebar);
  initDrag(dRight, rightbar);
})();

  navigator.serviceWorker.register('sw.js');
